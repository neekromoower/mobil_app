name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # разрешает запуск вручную

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install --upgrade flet
        pip install pymysql

    - name: Build APK
      run: |
        flet build apk --name "ECOM MOBILE PRO" --verbose

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/apk/app-release.apk
