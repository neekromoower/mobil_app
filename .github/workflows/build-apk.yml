name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libglu1-mesa

    - name: Install Python dependencies
      run: |
        pip install --upgrade flet
        pip install pymysql

    - name: Ensure assets folder exists
      run: |
        mkdir -p assets
        # Создаём пустые заглушки, чтобы код не падал из-за отсутствия файлов
        if [ ! -f assets/logo.png ]; then
          convert -size 32x32 xc:transparent assets/logo.png || echo "placeholder" > assets/logo.png
        fi
        if [ ! -f assets/icon.png ]; then
          convert -size 1024x1024 xc:blue assets/icon.png || echo "placeholder" > assets/icon.png
        fi

    - name: Build APK
      run: |
        flutter config --enable-android
        flutter doctor
        yes | flet build apk --verbose

    - name: Check build output
      if: always()
      run: |
        echo "Содержимое build/apk:"
        find build/apk -type f || echo "Папка build/apk отсутствует"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ecom-mobile-pro-apk
        path: build/apk/*.apk
        if-no-files-found: warn
