name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install --upgrade flet
        pip install pymysql

    - name: Build APK
      run: |
        # Показываем, что происходит после команды
        echo "yes" | flet build apk --verbose || true
        echo "======= Содержимое build/apk ======="
        ls -la build/apk/ || echo "Папка build/apk не найдена"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: ecom-mobile-pro-apk
        path: build/apk/*.apk
        if-no-files-found: warn
