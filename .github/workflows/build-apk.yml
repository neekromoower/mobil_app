name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        accept-android-sdk-licenses: true
        packages: 'platforms;android-33 build-tools;33.0.0'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        pip install --upgrade flet
        pip install pymysql

    - name: Ensure assets folder exists
      run: |
        mkdir -p assets
        if [ ! -f assets/logo.png ]; then echo "placeholder" > assets/logo.png; fi
        if [ ! -f assets/icon.png ]; then echo "placeholder" > assets/icon.png; fi

    - name: Build APK
      run: |
        flutter config --enable-android
        flutter doctor
        flet build apk --verbose

    - name: Check build output
      if: always()
      run: |
        echo "Содержимое build/apk:"
        find build/apk -type f || echo "Папка build/apk отсутствует"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ecom-mobile-pro-apk
        path: build/apk/*.apk
        if-no-files-found: warn
